name: Build and Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install deps
        run: sudo apt-get install -y cmake build-essential
      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make
      - name: Test
        run: cd build && ctest --output-on-failure